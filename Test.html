<!DOCTYPE html>
<html lang="vi">
    <head>
        <title>HTML DOM</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/style6.css">
        <style>
            .product-item {
                border: 1px solid #ccc;
                margin: 10px;
                padding: 10px;
                width: 200px;
                display: inline-block;
            }
            .product-image img {
                width: 100%;
                height: auto;
            }
            .product-info p {
                margin: 5px 0;
            }
        </style>
    </head>
    <body>
       <script>
        //tạo danh sách sản phẩm
        const products = [
            {
                name: "Hoa sen",
                price: "1.500.000đ/bó",
                image: "../assets/images/hoa-sen.jpg",
                link: "https://linhflower.com/thanh-tao-sen/"
            },
            {
                name: "Hoa hồng",
                price: "2.000.000đ/bó",
                image: "../assets/images/hoa-hong.jpg",
                link: "https://linhflower.com/hoa-hong/"
            },
            {
                name: "Hoa cúc",
                price: "1.000.000đ/bó",
                image: "../assets/images/hoa-cuc.jpg",
                link: "https://linhflower.com/hoa-cuc/"
            },
            {
                name: "Hoa ly",
                price: "1.800.000đ/bó",
                image: "../assets/images/hoa-ly.jpg",
                link: "https://linhflower.com/hoa-ly/"
            },
            {
                name: "Hoa hướng dương",
                price: "1.200.000đ/bó",
                image: "../assets/images/hoa-huong-duong.jpg",
                link: "https://linhflower.com/hoa-huong-duong/"
            },
            {
                name: "Hoa lan",
                price: "2.500.000đ/bó",
                image: "../assets/images/hoa-lan.jpg",
                link: "https://linhflower.com/hoa-lan/"
            },
            {
                name: "Hoa cẩm chướng",
                price: "1.300.000đ/bó",
                image: "../assets/images/hoa-cam-chuong.jpg",
                link: "https://linhflower.com/hoa-cam-chuong/"
            },
            {
                name: "Hoa baby",
                price: "800.000đ/bó",
                image: "../assets/images/hoa-baby.jpg",
                link: "https://linhflower.com/hoa-baby/"
            },
            {
                name: "Hoa tulip",
                price: "1.700.000đ/bó",
                image: "../assets/images/hoa-tulip.jpg",
                link: "https://linhflower.com/hoa-tulip/"
            },
            {
                name: "Hoa cẩm tú cầu",
                price: "1.400.000đ/bó",
                image: "../assets/images/hoa-cam-tu-cau.jpg",
                link: "https://linhflower.com/hoa-cam-tu-cau/"
            }
        ];
        //Duyệt qua danh sách sản phẩm và tạo phần tử HTML cho từng sản phẩm
        products.forEach(product => {
            //Tạo khung chính để chứa sản phẩm
            const productItem = document.createElement("div");
            productItem.setAttribute("class","product-item");
            //Tạo phần tử để chứa hình ảnh sản phẩm
            const productImage = document.createElement("div");
            productImage.setAttribute("class","product-image");
            //Tạo thẻ img để hiển thị hình ảnh sản phẩm
            const img = document.createElement("img");
            img.setAttribute("src", product.image);
            img.setAttribute("alt", product.name);
            img.setAttribute("width", "200px"); 
            img.setAttribute("height", "200px");
            //Gán thẻ img vào phần tử chứa hình ảnh
            productImage.appendChild(img);
            //Tạo phần tử để chứa thông tin sản phẩm
            const productInfo = document.createElement("div");
            productInfo.setAttribute("class","product-info");
            //Tạo thẻ p để hiển thị tên sản phẩm
            const productName = document.createElement("p");
            productName.setAttribute("class","product-name");
            productName.innerText = product.name;
            //Tạo thẻ p để hiển thị giá sản phẩm
            const productPrice = document.createElement("p");
            productPrice.setAttribute("class","product-price");
            productPrice.innerText = product.price;
            //Tạo thẻ a để hiển thị liên kết đến trang chi tiết sản phẩm
            const productLink = document.createElement("a");
            productLink.setAttribute("class","product-link");
            productLink.setAttribute("href", product.link);
            productLink.innerText = "Xem chi tiết";
            //Gán các phần tử vào phần tử chứa thông tin sản phẩm
            productInfo.appendChild(productName);
            productInfo.appendChild(productPrice);
            productInfo.appendChild(productLink);
            //Gán các phần tử vào khung chính
            productItem.appendChild(productImage);
            productItem.appendChild(productInfo);
            //Gán khung chính vào body
            document.body.appendChild(productItem); 
        });
    </script>
    </body>
</html>
